# --------------------------------------
# Hexo Butterfly 主题配置
# 如有任何问题，请参考文档
# 中文: https://butterfly.js.org/
# 英文: https://butterfly.js.org/en/
# --------------------------------------

# --------------------------------------
# 导航栏设置
# --------------------------------------

nav:
  # 导航栏 logo 图片
  logo:
  # 是否显示网站标题
  display_title: true
  # 是否显示文章标题
  display_post_title: true
  # 是否固定导航栏
  fixed: false

menu:
  # 导航菜单配置格式: 菜单项: 链接 || 图标
  # 示例: Home: / || fas fa-home
  # 多级菜单示例:
  # List||fas fa-list:
  #   Music: /music/ || fas fa-music
  #   Movie: /movies/ || fas fa-video
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  友链: /link/ || fas fa-link

# --------------------------------------
# 代码块设置
# --------------------------------------

code_blocks:
  # 代码块主题: darker / pale night / light / ocean / false
  theme: light
  # 是否启用 Mac 风格代码块
  macStyle: false
  # 代码块高度限制 (单位: px)
  height_limit: false
  # 是否自动换行
  word_wrap: false

  # 工具栏
  # 是否显示复制按钮
  copy: true
  # 是否显示语言名称
  language: true
  # 代码块收缩设置: true: 收缩代码块 | false: 展开代码块 | none: 展开代码块并隐藏按钮
  shrink: false
  # 是否显示全屏按钮
  fullpage: false

# 社交媒体链接
# 格式:
#   图标: 链接 || 描述 || 颜色
social:
  fab fa-bilibili: https://space.bilibili.com/444943062 || 哔哩哔哩(皖月清风) || '#00a1d6'
  fas fa-play: https://space.bilibili.com/2059784457 || 哔哩哔哩(Pooi) || '#00a1d6'
  fab fa-github: https://github.com/pooi-woop || GitHub || '#24292e'
  fas fa-gamepad: https://www.xiaoheihe.cn/app/user/profile/89276699 || 小黑盒 || '#00a1d6'
  fas fa-envelope: mailto:1960583030@qq.com || 邮箱 || '#4a7dbe'
  fab fa-steam: https://steamcommunity.com/profiles/76561198984384066/ || Steam || '#00a1d6'
  fas fa-cat: https://www.mfuns.net/member/32698 || 喵御宅 || '#00a1d6'
  fas fa-comments: https://tieba.baidu.com/home/main?id=tb.1.3a262b89.IwcgVsMq1NwbQUKrazsfTg&fr=userbar || 百度贴吧 || '#00a1d6'
  fas fa-music: https://music.163.com/#/user/home?id=1359234587 || 网易云音乐 || '#00a1d6'
  fab fa-tiktok: https://www.douyin.com/user/MS4wLjABAAAAlK-w0K6GoHT6CzVvfomyhJZoal1ljhvlJieh4u1CsBGAdM2dW_Z3h6SaFK4IanSm?from_tab_name=main || 抖音 || '#00a1d6'
  fas fa-code: https://leetcode.cn/u/woop-r/ || LeetCode || '#00a1d6'

# --------------------------------------
# 图片设置
# --------------------------------------

# 网站图标
favicon: /img/favicon.png

# 头像设置
avatar:
  # 头像图片路径
  img: /img/butterfly-icon.jpg
  # 是否启用头像悬停效果
  effect: false

# 是否禁用所有顶部横幅图片
disable_top_img: false

# 如果页面未设置横幅图片，将显示默认顶部图片
default_top_img: /img/9fde1f954a608ba02a492108e6e13a2972233788.jpg

# 首页横幅图片
index_img: /img/7ff84c885b2fdb45d7faee23e82371261035330202.png

# 归档页横幅图片
archive_img: /img/6f0ee42329cbb59e599b9783259eebea1040084789.jpg

# 标签页横幅图片 (注意: 是 tag 页面，不是 tags 页面)
tag_img: /img/6f0ee42329cbb59e599b9783259eebea1040084789.jpg

# 每个标签的横幅图片，可为每个标签设置不同的横幅图片
# 格式:
#  - 标签名称: 图片路径
tag_per_img:

# 分类页横幅图片 (注意: 是 category 页面，不是 categories 页面)
category_img: /img/7ff84c885b2fdb45d7faee23e82371261035330202.png

# 每个分类的横幅图片，可为每个分类设置不同的横幅图片
# 格式:
#  - 分类名称: 图片路径
category_per_img: 

# 页脚背景图片
footer_img: img/2026/20260323-180427.012-4.jpg

# 网站背景
# 可设置为颜色、图片 URL 或包含颜色和/或图片 URL 的数组
# 如果提供数组，每次加载时会从数组中随机选择一个背景
background: img/2026/20260323-180427.012-16.jpg

# 封面设置
cover: 
  # 是否禁用封面
  index_enable: true
  aside_enable: true
  archives_enable: true
  # 当未设置封面时，将显示默认封面
  default_cover:
    # - xxx.jpg

# 替换损坏的图片
error_img:
  # 友链页面的错误图片
  flink: /img/friend_404.gif
  # 文章页面的错误图片
  post_page: /img/404.jpg

# 简单的 404 页面
error_404:
  # 是否启用
  enable: false
  # 副标题
  subtitle: 'Page Not Found'
  # 背景图片
  background: /img/error-page.png

# 文章元信息设置
post_meta:
  # 首页
  page:
    # 日期类型: created / updated / both
    date_type: created
    # 日期格式: date / relative
    date_format: date
    # 是否显示分类
    categories: true
    # 是否显示标签
    tags: false
    # 是否显示标签文本
    label: true
  # 文章页
  post:
    # 位置: left / center
    position: left
    # 日期类型: created / updated / both
    date_type: both
    # 日期格式: date / relative
    date_format: date
    # 是否显示分类
    categories: true
    # 是否显示标签
    tags: true
    # 是否显示标签文本
    label: true

# --------------------------------------
# 首页设置
# --------------------------------------

# 首页顶部图片设置
# 默认: 顶部图片 - 全屏，网站信息 - 中间
# 网站信息的位置，例如: 300px/300em/300rem/10%
index_site_info_top:
# 顶部图片的高度，例如: 300px/300em/300rem
index_top_img_height:

# 首页副标题
subtitle:
  # 是否启用
  enable: true
  # 打字机效果
  effect: true
  # 自定义 typed.js
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
  # 来源 - 调用第三方服务 API (仅中文)
  # 它会先显示来源，然后显示 sub 的内容
  # 选择: false/1/2/3
  # false - 禁用此功能
  # 1 - hitokoto.cn
  # 2 - https://api.aa1.cn/doc/yiyan.html
  # 3 - jinrishici.com
  source: false
  # 如果你关闭打字机效果，副标题将只显示 sub 的第一行
  sub:

# 首页文章布局
# 1: 封面在左，信息在右
# 2: 封面在右，信息在左
# 3: 封面和信息左右交替
# 4: 封面在上，信息在下
# 5: 信息显示在封面上
# 6: 瀑布流布局 - 封面在上，信息在下
# 7: 瀑布流布局 - 信息显示在封面上
index_layout: 3

# 在首页显示文章简介
# 1: description
# 2: both (如果存在 description，将显示 description，否则显示 auto_excerpt)
# 3: auto_excerpt (默认)
# false: 不显示文章简介
index_post_content:
  method: 3
  # 如果你设置 method 为 2 或 3，需要配置长度
  length: 500

# --------------------------------------
# 文章设置
# --------------------------------------

# 目录设置
toc:
  # 文章页是否显示目录
  post: true
  # 页面是否显示目录
  page: false
  # 是否显示目录编号
  number: true
  # 是否展开目录
  expand: false
  # 仅用于文章
  style_simple: false
  # 是否显示滚动百分比
  scroll_percent: true

# 文章版权设置
post_copyright:
  # 是否启用
  enable: true
  # 是否解码
  decode: false
  # 作者链接
  author_href:
  # 许可证
  license: CC BY-NC-SA 4.0
  # 许可证链接
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏功能
reward:
  # 是否启用
  enable: false
  # 打赏文本
  text:
  # 二维码
  QR_code:
    # - img: /img/wechat.jpg
    #   link:
    #   text: wechat
    # - img: /img/alipay.jpg
    #   link:
    #   text: alipay

# 文章编辑
# 方便在线浏览和编辑博客源代码
post_edit:
  # 是否启用
  enable: false
  # 编辑链接: https://github.com/user-name/repo-name/edit/branch-name/subdirectory-name/
  # 示例: https://github.com/jerryc127/butterfly.js.org/edit/main/source/
  url:

# 相关文章
related_post:
  # 是否启用
  enable: true
  # 显示的文章数量
  limit: 6
  # 选择: created / updated
  date_type: created

# 文章分页
# 选择: 1 / 2 / false
# 1: '下一篇' 链接到旧文章
# 2: '下一篇' 链接到新文章
# false: 禁用分页
post_pagination: 1

# 显示文章过时通知
noticeOutdate:
  # 是否启用
  enable: false
  # 样式: simple / flat
  style: flat
  # 何时显示
  limit_day: 365
  # 位置: top / bottom
  position: top
  # 通知文本前半部分
  message_prev: It has been
  # 通知文本后半部分
  message_next: days since the last update, the content of the article may be outdated.

# --------------------------------------
# 页脚设置
# --------------------------------------

footer:
  # 页脚导航
  nav:
  # 网站所有者信息
  owner:
    # 是否启用
    enable: true
    # 开始年份
    since: 2025
  # 主题和框架版权
  copyright:
    # 是否启用
    enable: true
    # 是否显示版本
    version: true
  # 自定义文本
  custom_text:

# --------------------------------------
# 侧边栏设置
# --------------------------------------

aside:
  # 是否启用侧边栏
  enable: true
  # 是否隐藏侧边栏
  hide: false
  # 在右下角按钮中显示隐藏侧边栏的按钮
  button: true
  # 移动端是否显示侧边栏
  mobile: true
  # 位置: left / right
  position: right
  # 显示选项
  display:
    # 是否显示归档
    archive: true
    # 是否显示标签
    tag: true
    # 是否显示分类
    category: true
  # 作者卡片
  card_author:
    # 是否启用
    enable: true
    # 描述
    description:
    # 按钮
    button:
      # 是否启用
      enable: true
      # 图标
      icon: fab fa-github
      # 文本
      text: Follow Me
      # 链接
      link: https://github.com/pooi-woop
    # 显示社交媒体图标
    social: true
  # 公告卡片
  card_announcement:
    # 是否启用
    enable: true
    # 内容
    content: 欢迎来到清风的个人博客！
  # 最近文章卡片
  card_recent_post:
    # 是否启用
    enable: true
    # 如果设置为 0 将显示所有
    limit: 5
    # 排序: date / updated
    sort: date
    sort_order:
  # 最新评论卡片
  card_newest_comments:
    # 是否启用
    enable: false
    sort_order:
    # 显示数量
    limit: 6
    # 单位: 分钟，将数据保存到 localStorage
    storage: 10
    # 是否显示头像
    avatar: true
  # 分类卡片
  card_categories:
    # 是否启用
    enable: true
    # 如果设置为 0 将显示所有
    limit: 8
    # 选择: none / true / false
    expand: none
    sort_order:
  # 标签卡片
  card_tags:
    # 是否启用
    enable: true
    # 如果设置为 0 将显示所有
    limit: 40
    # 是否显示彩色标签
    color: false
    # 自定义颜色
    custom_colors:
    # 标签排序，random/name/length
    orderby: random
    # 排序方式: 1, asc 升序; -1, desc 降序
    order: 1
    sort_order:
  # 归档卡片
  card_archives:
    # 是否启用
    enable: true
    # 类型: monthly / yearly
    type: monthly
    # 格式: 例如 YYYY年MM月
    format: MMMM YYYY
    # 排序方式: 1, asc 升序; -1, desc 降序
    order: -1
    # 如果设置为 0 将显示所有
    limit: 8
    sort_order:
  # 文章系列卡片
  card_post_series:
    # 是否启用
    enable: true
    # 标题显示系列名称
    series_title: false
    # 按标题或日期排序
    orderBy: 'date'
    # 排序方式: 1, asc 升序; -1, desc 降序
    order: -1
  # 网站信息卡片
  card_webinfo:
    # 是否启用
    enable: true
    # 是否显示文章数量
    post_count: true
    # 是否显示最后推送日期
    last_push_date: true
    sort_order:
    # 发布日期与现在的时间差
    # 格式: Month/Day/Year Time 或 Year/Month/Day Time
    # 如果不启用此功能，请留空
    runtime_date:

# --------------------------------------
# 右下角按钮设置
# --------------------------------------

# 右下角按钮与底部的距离 (默认单位: px)
rightside_bottom:

# 繁简中文转换
translate:
  # 是否启用
  enable: false
  # 按钮文本
  default: 繁
  # 网站语言 (1 - 繁体中文/ 2 - 简体中文）
  defaultEncoding: 2
  # 时间延迟
  translateDelay: 0
  # 当语言为简体中文时按钮的文本
  msgToTraditionalChinese: '繁'
  # 当语言为繁体中文时按钮的文本
  msgToSimplifiedChinese: '簡'

# 阅读模式
readmode: true

# 暗黑模式
darkmode:
  # 是否启用
  enable: true
  # 切换暗黑/亮色模式的按钮
  button: true
  # 自动切换暗黑/亮色模式
  # autoChangeMode: 1  跟随系统设置，如果系统不支持暗黑模式，将在晚上 6 点到早上 6 点之间切换暗黑模式
  # autoChangeMode: 2  在晚上 6 点到早上 6 点之间切换暗黑模式
  # autoChangeMode: false
  autoChangeMode: false
  # 设置亮色模式时间。值在 0 到 24 之间。如果不设置，默认值为 6 和 18
  start:
  end:

# 在回到顶部按钮中显示滚动百分比
rightside_scroll_percent: false

# 除非你知道它们的工作原理，否则不要修改以下设置
# 选择: readmode,translate,darkmode,hideAside,toc,chat,comment
# 不要重复相同的值
rightside_item_order:
  # 是否启用
  enable: false
  # 默认: readmode,translate,darkmode,hideAside
  hide:
  # 默认: toc,chat,comment
  show:

# 右下角配置按钮的动画
rightside_config_animation: true

# --------------------------------------
# 全局设置
# --------------------------------------

# 锚点设置
anchor:
  # 当你滚动时，URL 会根据标题 id 更新
  auto_update: false
  # 点击标题滚动并更新锚点
  click_to_scroll: false

# 图片自动添加图注
photofigcaption: false

# 复制功能
copy:
  # 是否启用
  enable: true
  # 在复制的内容后添加版权信息
  copyright:
    # 是否启用
    enable: false
    # 限制字数
    limit_count: 150

# 需要安装 hexo-wordcount 插件
wordcount:
  # 是否启用
  enable: false
  # 在文章元信息中显示文章字数
  post_wordcount: true
  # 在文章元信息中显示阅读时间
  min2read: true
  # 在侧边栏网站信息中显示网站总字数
  total_wordcount: true

# 网站 PV / UV 统计（不蒜子）
busuanzi:
  # 是否显示网站 UV
  site_uv: true
  # 是否显示网站 PV
  site_pv: true
  # 是否显示页面 PV
  page_pv: true

# --------------------------------------
# 数学公式设置
# --------------------------------------

# 关于 per_page
# 如果你设置为 true，它会在每个页面加载 mathjax/katex 脚本
# 如果你设置为 false，它会根据你的设置加载 mathjax/katex 脚本（在页面的 front-matter 中添加 'mathjax: true' 或 'katex: true'）
math:
  # 选择: mathjax, katex
  # 如果你不需要数学公式，请留空
  use:
  per_page: true
  # 是否隐藏滚动条
  hide_scrollbar: false

  # MathJax 设置
  mathjax:
    # 启用上下文菜单
    enableMenu: true
    # 选择: all / ams / none, 控制方程是否编号以及如何编号
    tags: none

  # KaTeX 设置
  katex:
    # 启用复制 KaTeX 公式
    copy_tex: false

# --------------------------------------
# 搜索设置
# --------------------------------------

search:
  # 选择: algolia_search / local_search / docsearch
  # 如果你不需要搜索，请留空
  use:
  # 搜索框占位符
  placeholder:

  # Algolia 搜索
  algolia_search:
    # 每页搜索结果数量
    hitsPerPage: 6

  # 本地搜索
  local_search:
    # 页面加载时预加载搜索数据
    preload: false
    # 每篇文章显示前 n 个结果，设置为 -1 显示所有结果
    top_n_per_article: 1
    # 解码 html 字符串为可读形式
    unescape: false
    # 为搜索结果启用分页
    pagination:
      # 是否启用
      enable: false
      # 每页搜索结果数量
      hitsPerPage: 8
    CDN:

  # Docsearch
  # https://docsearch.algolia.com/
  docsearch:
    appId:
    apiKey:
    indexName:
    option:

# --------------------------------------
# 分享系统
# --------------------------------------

share:
  # 选择: sharejs / addtoany
  # 如果你不需要分享，请留空
  use: sharejs

  # Share.js
  # https://github.com/overtrue/share.js
  sharejs:
    # 分享站点
    sites: facebook,x,wechat,weibo,qq

  # AddToAny
  # https://www.addtoany.com/
  addtoany:
    # 分享项目
    item: facebook,x,wechat,sina_weibo,facebook_messenger,email,copy_link

# --------------------------------------
# 评论系统
# --------------------------------------

comments:
  # 最多两个评论系统，第一个将作为默认显示
  # 如果你不需要评论，请留空
  # 选择: Disqus/Disqusjs/Livere/Gitalk/Valine/Waline/Utterances/Facebook Comments/Twikoo/Giscus/Remark42/Artalk
  # 两个评论系统的格式: Disqus,Waline
  use: Giscus
  # 在按钮旁边显示评论名称
  text: true
  # 懒加载: 评论系统将在评论元素进入浏览器视口时加载
  # 如果你设置为 true，评论计数将无效
  lazyload: false
  # 在文章顶部图片中显示评论计数
  count: false
  # 在首页显示评论计数
  card_post_count: false

# Disqus
# https://disqus.com/
disqus:
  shortname:
  # 用于最新评论小部件
  apikey:

# 替代 Disqus - 使用 Disqus API 渲染评论
# https://github.com/SukkaW/DisqusJS
disqusjs:
  shortname:
  apikey:
  option:

# Livere
# https://www.livere.com/
livere:
  uid:

# Gitalk
# https://github.com/gitalk/gitalk
gitalk:
  client_id:
  client_secret:
  repo:
  owner:
  admin:
  option:

# Valine
# https://valine.js.org
valine:
  appId:
  appKey:
  avatar: monsterid
  # 此配置适用于国内自定义域名用户，海外版本会自动检测（无需手动填写）
  serverURLs:
  bg:
  # 使用 Valine 访问者计数作为页面浏览量
  visitor: false
  option:

# Waline - 一个带后端支持的简单评论系统，从 Valine 分叉
# https://waline.js.org/
waline:
  serverURL:
  bg:
  # 使用 Waline 页面浏览量计数作为页面浏览量
  pageview: false
  option:

# Utterances
# https://utteranc.es/
utterances:
  repo:
  # Issue 映射: pathname/url/title/og:title
  issue_term: pathname
  # 主题: github-light/github-dark/github-dark-orange/icy-dark/dark-blue/photon-dark
  light_theme: github-light
  dark_theme: photon-dark
  js:
  option:

# Facebook Comments Plugin
# https://developers.facebook.com/docs/plugins/comments/
facebook_comments:
  app_id:
  # 可选
  user_id:
  pageSize: 10
  # 选择: social / time / reverse_time
  order_by: social
  lang: en_US

# Twikoo
# https://github.com/imaegoo/twikoo
twikoo:
  envId:
  region:
  # 使用 Twikoo 访问者计数作为页面浏览量
  visitor: false
  option:

# Giscus
# https://giscus.app/
giscus:
  repo: pooi-woop/pooiwoop              # 你的仓库
  repo_id: R_kgDORqG0YQ
  category: Announcements               # Discussion 分类
  category_id: DIC_kwDORqG0Yc4C4qyU
  mapping: pathname
  reactions_enabled: true
  emit_metadata: false
  light_theme: light
  dark_theme: dark
  js: https://giscus.app/client.js
  option:
    lang: zh-CN
    loading: lazy
    inputPosition: top

# Remark42
# https://remark42.com/docs/configuration/frontend/
remark42:
  host:
  siteId:
  option:

# Artalk
# https://artalk.js.org/guide/frontend/config.html
artalk:
  server:
  site:
  # 使用 Artalk 访问者计数作为页面浏览量
  visitor: false
  option:

# --------------------------------------
# 聊天服务
# --------------------------------------

chat:
  # 选择: chatra/tidio/crisp
  # 如果你不需要聊天，请留空
  use:
  # 聊天按钮 [推荐]
  # 它会在网站右下角创建一个按钮，并隐藏原始按钮
  rightside_button: false
  # 滚动向上时显示原始聊天按钮，滚动向下时隐藏按钮
  button_hide_show: false

# https://chatra.io/
chatra:
  id:

# https://www.tidio.com/
tidio:
  public_key:

# https://crisp.chat/en/
crisp:
  website_id:

# --------------------------------------
# 分析工具
# --------------------------------------

# 百度统计
# https://tongji.baidu.com/web/welcome/login
baidu_analytics:

# Google Analytics
# https://analytics.google.com/analytics/web/
google_analytics:

# Cloudflare Analytics
# https://www.cloudflare.com/zh-tw/web-analytics/
cloudflare_analytics:

# Microsoft Clarity
# https://clarity.microsoft.com/
microsoft_clarity:

# Umami Analytics
# https://umami.is/
umami_analytics:
  # 是否启用
  enable: false
  # 对于自托管设置，配置 Umami 实例的主机名
  serverURL:
  script_name: script.js
  website_id:
  option:
  UV_PV:
    # 是否显示网站 UV
    site_uv: false
    # 是否显示网站 PV
    site_pv: false
    # 是否显示页面 PV
    page_pv: false
    # Umami Cloud (API key) / 自托管 Umami (token)
    token:

# Google Tag Manager
# https://www.googletagmanager.com/
google_tag_manager:
  tag_id:
  # 可选
  domain:

# --------------------------------------
# 广告设置
# --------------------------------------

# Google Adsense
google_adsense:
  # 是否启用
  enable: false
  # 是否启用自动广告
  auto_ads: true
  js: https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js
  client:
  # 是否启用页面级广告
  enable_page_level_ads: true

# 手动插入广告
# 如果你不需要广告，请留空
ad:
  # 在首页插入广告（每三篇文章）
  index:
  # 在侧边栏插入广告
  aside:
  # 在文章中插入广告（分页前）
  post:

# --------------------------------------
# 网站验证
# --------------------------------------

site_verification:
  # 示例:
  # - name: google-site-verification
  #   content: xxxxxx
  # - name: baidu-site-verification
  #   content: xxxxxxx

# --------------------------------------
# 美化 / 效果
# --------------------------------------

# 自定义主题颜色
# 注意: 颜色值必须用双引号括起来，如 "#000"，否则可能会导致错误!

# theme_color:
#   enable: true
#   main: "#49B1F5"
#   paginator: "#00c4b6"
#   button_hover: "#FF7242"
#   text_selection: "#00c4b6"
#   link_color: "#99a9bf"
#   meta_color: "#858585"
#   hr_color: "#A4D8FA"
#   code_foreground: "#F47466"
#   code_background: "rgba(27, 31, 35, .05)"
#   toc_color: "#00c4b6"
#   blockquote_padding_color: "#49b1f5"
#   blockquote_background_color: "#49b1f5"
#   scrollbar_color: "#49b1f5"
#   meta_theme_color_light: "ffffff"
#   meta_theme_color_dark: "#0d0d0d"

# 分类和标签页面的用户界面设置
# 选择: index - 与首页 UI 相同 / default - 与归档页 UI 相同
# 留空或设置为 index
category_ui:
tag_ui:

# UI 元素的圆角
rounded_corners_ui: true

# 拉伸线条，使每行宽度相等
text_align_justify: false

# 为头部和底部添加遮罩
mask:
  # 头部
  header: true
  # 底部
  footer: true

# 加载动画
preloader:
  # 是否启用
  enable: false
  # 来源
  # 1. fullpage-loading
  # 2. pace (进度条)
  source: 1
  # pace 主题 (参见 https://codebyzach.github.io/pace/)
  pace_css_url:

# 页面过渡效果
enter_transitions: true

# 默认显示模式 - light (默认) / dark
display_mode: light

# 美化文章内容的配置
beautify:
  # 是否启用
  enable: false
  # 指定要美化的字段 (site 或 post)
  field: post
  # 指定用作标题前缀的图标，例如 '\f0c1'
  title_prefix_icon:
  # 指定标题前缀图标的颜色，例如 '#F47466'
  title_prefix_icon_color:

# 全局字体设置
# 除非你知道它们的工作原理，否则不要修改以下设置
font:
  global_font_size:
  code_font_size:
  font_family:
  code_font_family:

# 网站标题和副标题的字体设置
blog_title_font:
  font_link:
  font_family:

# 分隔线图标的设置
hr_icon:
  # 是否启用
  enable: true
  # Font Awesome 图标的 unicode 值，例如 '\3423'
  icon:
  icon_top:

# 打字机效果
# https://github.com/disjukr/activate-power-mode
activate_power_mode:
  # 是否启用
  enable: false
  # 是否彩色
  colorful: true
  # 是否抖动
  shake: true
  # 移动端是否启用
  mobile: false

# 背景效果
# --------------------------------------

# canvas_ribbon
# 参见: https://github.com/hustcc/ribbon.js
canvas_ribbon:
  # 是否启用
  enable: false
  #  ribbon 的大小
  size: 150
  # ribbon 的透明度 (0 ~ 1)
  alpha: 0.6
  zIndex: -1
  # 点击更换
  click_to_change: false
  # 移动端是否启用
  mobile: false

# 飘动的 ribbon
canvas_fluttering_ribbon:
  # 是否启用
  enable: false
  # 移动端是否启用
  mobile: false

# canvas_nest
# https://github.com/hustcc/canvas-nest.js
canvas_nest:
  # 是否启用
  enable: false
  # 线条颜色，默认: '0,0,0'; RGB 值: (R,G,B).(注意: 使用 ',' 分隔.)
  color: '0,0,255'
  # 线条的透明度 (0~1)
  opacity: 0.7
  # 背景的 z-index 属性
  zIndex: -1
  # 线条数量
  count: 99
  # 移动端是否启用
  mobile: false

# 鼠标点击效果: 烟花
fireworks:
  # 是否启用
  enable: false
  zIndex: 9999
  # 移动端是否启用
  mobile: false

# 鼠标点击效果: 心形符号
click_heart:
  # 是否启用
  enable: false
  # 移动端是否启用
  mobile: false

# 鼠标点击效果: 文字
clickShowText:
  # 是否启用
  enable: false
  # 文字
  text:
    # - I
    # - LOVE
    # - YOU
  # 字体大小
  fontSize: 15px
  # 是否随机
  random: false
  # 移动端是否启用
  mobile: false

# --------------------------------------
# Lightbox 设置
# --------------------------------------

# 选择: fancybox / medium_zoom
# https://github.com/francoischalifour/medium-zoom
# https://fancyapps.com/fancybox/
# 如果你不需要 lightbox，请留空
lightbox:

# --------------------------------------
# 标签插件设置
# --------------------------------------

# 系列文章
series:
  # 是否启用
  enable: false
  # 按标题或日期排序
  orderBy: 'title'
  # 排序方式: 1, asc 升序; -1, desc 降序
  order: 1
  # 是否显示编号
  number: true

# ABCJS - ABC 音乐符号插件
# https://github.com/paulrosen/abcjs
abcjs:
  # 是否启用
  enable: false
  # 是否每页加载
  per_page: true

# Mermaid
# https://github.com/mermaid-js/mermaid
mermaid:
  # 是否启用
  enable: false
  # 使用代码块编写 Mermaid 图表
  code_write: false
  # 内置主题: default / forest / dark / neutral
  theme:
    light: default
    dark: dark
  # 启用 "在新标签页中打开" 按钮以在单独的窗口中查看图表
  open_in_new_tab: true
  # 启用图表的缩放和平移交互
  zoom_pan: true

# chartjs
# 参见 https://www.chartjs.org/docs/latest/
chartjs:
  # 是否启用
  enable: false
  # 除非你理解它们的工作原理，否则不要修改
  # 默认设置仅在未指定 MD 语法时使用
  # 图表的一般字体颜色
  fontColor:
    light: 'rgba(0, 0, 0, 0.8)'
    dark: 'rgba(255, 255, 255, 0.8)'
  # 图表的一般边框颜色
  borderColor:
    light: 'rgba(0, 0, 0, 0.1)'
    dark: 'rgba(255, 255, 255, 0.2)'
  # 雷达图和极地区域图上刻度标签的背景颜色
  scale_ticks_backdropColor:
    light: 'transparent'
    dark: 'transparent'

# Note - Bootstrap Callout
note:
  # Note 标签样式值:
  #  - simple    bs-callout 旧 alert 样式。默认。
  #  - modern    bs-callout 新 (v2-v3) alert 样式。
  #  - flat      带有背景的扁平 callout 样式，如 Mozilla 或 StackOverflow 上的。
  #  - disabled  禁用 note 标签的所有 CSS 样式导入。
  style: flat
  # 是否显示图标
  icons: true
  # 边框半径
  border_radius: 3
  # modern 和 flat 样式的背景亮度偏移百分比 (modern: -12 | 12; flat: -18 | 6)。
  # 偏移也应用于标签变量。此选项可以与禁用的 note 标签一起使用。
  light_bg_offset: 0

# --------------------------------------
# 其他设置
# --------------------------------------

# Pjax
# https://github.com/MoOx/pjax
pjax:
  # 是否启用
  enable: false
  # 从 pjax 中排除指定的页面，例如 '/music/'
  exclude:
    # - /xxxxxx/

# 注入 css 和脚本 (aplayer/meting)
aplayerInject:
  # 是否启用
  enable: false
  # 是否每页加载
  per_page: true

# Snackbar - Toast 通知
# https://github.com/polonel/SnackBar
# 位置: top-left / top-center / top-right / bottom-left / bottom-center / bottom-right
snackbar:
  # 是否启用
  enable: false
  # 位置
  position: bottom-left
  # 亮色模式和暗黑模式下 Toast 通知的背景颜色
  bg_light: '#49b1f5'
  bg_dark: '#1f1f1f'

# Instant.page
# https://instant.page/
instantpage: false

# 懒加载
# https://github.com/verlok/vanilla-lazyload
lazyload:
  # 是否启用
  enable: false
  # 使用浏览器的原生懒加载而不是 vanilla-lazyload
  native: false
  # 指定使用懒加载的字段 (site 或 post)
  field: site
  # 占位符
  placeholder:
  # 是否模糊
  blur: false

# PWA
# 参见 https://github.com/JLHwung/hexo-offline
# ---------------
pwa:
  # 是否启用
  enable: false
  # 清单文件
  manifest:
  # Apple 触摸图标
  apple_touch_icon:
  # 32x32 网站图标
  favicon_32_32:
  # 16x16 网站图标
  favicon_16_16:
  # 掩码图标
  mask_icon:

# Open Graph 元标签
# https://hexo.io/docs/helpers#open-graph
Open_Graph_meta:
  # 是否启用
  enable: true
  option:
    # twitter_card:
    # twitter_image:
    # twitter_id:
    # twitter_site:
    # google_plus:
    # fb_admins:
    # fb_app_id:

# 结构化数据
# https://developers.google.com/search/docs/guides/intro-structured-data
structured_data:
  # 是否启用
  enable: false
  # 网站的备用名称，用于结构化数据
  # 格式: ['name1', 'name2']
  alternate_name:

# 添加 vendor 前缀以确保兼容性
css_prefix: true

# 注入
# 向头部 (在 '</head>' 标签之前) 和底部 (在 '</body>' 标签之前) 插入代码
inject:
  # 头部
  head:
    - <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    - |
      <style>
      /* 首页标题样式 */
      .index-info .site-title {
        font-size: 3rem;
        opacity: 0.5;
      }
      </style>
  # 底部
  bottom:
    # - <script src="xxxx"></script>

# CDN 设置
# 除非你知道它们的工作原理，否则不要修改以下设置
CDN:
  # 内部和第三方脚本的 CDN 提供商
  # 选项: local/jsdelivr/unpkg/cdnjs/custom
  # 注意: 开发版本只能使用 'local' 作为内部脚本
  # 注意: 当将第三方脚本设置为 'local' 时，你需要安装 hexo-butterfly-extjs
  internal_provider: local
  third_party_provider: cdnjs

  # 向 URL 添加版本号，true 或 false
  version: true

  # 自定义格式
  # 例如: https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format:

  # 选项
  option:
    # abcjs_basic_js:
    # activate_power_mode:
    # algolia_js:
    # algolia_search:
    # aplayer_css:
    # aplayer_js:
    # artalk_css:
    # artalk_js:
    # blueimp_md5:
    # busuanzi:
    # canvas_fluttering_ribbon:
    # canvas_nest:
    # canvas_ribbon:
    # chartjs:
    # click_heart:
    # clickShowText:
    # disqusjs:
    # disqusjs_css:
    # docsearch_css:
    # docsearch_js:
    # egjs_infinitegrid:
    # fancybox:
    # fancybox_css:
    # fireworks:
    # fontawesome:
    # gitalk:
    # gitalk_css:
    # giscus:
    # instantpage:
    # katex:
    # katex_copytex:
    # lazyload:
    # local_search:
    # main:
    # main_css:
    # mathjax:
    # medium_zoom:
    # mermaid:
    # meting_js:
    # prismjs_autoloader:
    # prismjs_js:
    # prismjs_lineNumber_js:
    # pjax:
    # sharejs:
    # sharejs_css:
    # snackbar:
    # snackbar_css:
    # translate:
    # twikoo:
    # typed:
    # utils:
    # valine:
    # waline_css:
    # waline_js: